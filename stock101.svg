<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .card { animation: float 3s ease-in-out infinite; cursor: pointer; }
    .bg { fill: #ffffff; stroke: #0969da; stroke-width: 2; rx: 15; }
    text { font-family: 'Segoe UI', sans-serif; fill: #24292f; }
  </style>
  <g class="card">
    <title>Spring Boot 기반 주식 시뮬레이션 및 보안 필터 구현</title>
    <rect class="bg" width="190" height="90" x="5" y="5"/>
    <text x="100" y="45" text-anchor="middle" font-weight="bold" font-size="16">📈 Stock101</text>
    <text x="100" y="70" text-anchor="middle" font-size="12" fill="#57606a">Java/Spring Boot</text>
  </g>
</svg>
